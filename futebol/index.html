<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario World - Pular Obstáculos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        marioRed: '#E52521',
                        marioBlue: '#0066CC',
                        marioGreen: '#4DAF50',
                        marioBrown: '#8B4513',
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-sky-300 flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-2xl md:text-4xl text-marioRed mb-6 drop-shadow-lg">MARIO WORLD</h1>
    <p class="text-sm mb-4">Use a tecla ESPAÇO para pular</p>

    <!-- Área do Jogo -->
    <div id="gameArea" class="w-[800px] h-[400px] bg-gradient-to-b from-sky-400 to-sky-200 border-4 border-marioBrown relative overflow-hidden">
        <!-- Personagem Mario -->
        <div id="mario" class="absolute w-12 h-16 bg-marioRed rounded-b-lg" style="bottom: 40px; left: 80px;">
            <div class="w-full h-1/2 bg-marioBlue absolute bottom-0 rounded-b-lg"></div>
            <div class="w-3 h-3 bg-yellow-400 rounded-full absolute top-2 right-2"></div>
        </div>

        <!-- Obstáculo -->
        <div id="obstacle" class="absolute w-8 h-10 bg-marioGreen rounded-t-lg" style="bottom: 40px; right: -80px;">
            <div class="w-full h-2 bg-green-700 absolute top-0"></div>
        </div>

        <!-- Chão -->
        <div class="absolute bottom-0 w-full h-[40px] bg-marioBrown">
            <div class="flex justify-around items-center h-full">
                <div class="w-4 h-4 bg-yellow-700 rounded-sm"></div>
                <div class="w-4 h-4 bg-yellow-700 rounded-sm"></div>
                <div class="w-4 h-4 bg-yellow-700 rounded-sm"></div>
                <div class="w-4 h-4 bg-yellow-700 rounded-sm"></div>
                <div class="w-4 h-4 bg-yellow-700 rounded-sm"></div>
                <div class="w-4 h-4 bg-yellow-700 rounded-sm"></div>
            </div>
        </div>

        <!-- Placar -->
        <div id="score" class="absolute top-4 left-4 text-white text-lg">Pontos: 0</div>
        <div id="gameOverText" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-marioRed text-3xl hidden drop-shadow-[0_0_8px_white]">FIM DE JOGO!</div>
    </div>

    <button id="restartBtn" class="mt-6 bg-marioGreen text-white px-6 py-3 rounded-lg hover:bg-green-600 transition-all transform hover:scale-105 hidden">REINICIAR</button>

    <script>
        // Elementos
        const mario = document.getElementById('mario');
        const obstacle = document.getElementById('obstacle');
        const gameArea = document.getElementById('gameArea');
        const scoreEl = document.getElementById('score');
        const gameOverText = document.getElementById('gameOverText');
        const restartBtn = document.getElementById('restartBtn');

        // Variáveis do jogo
        let marioBottom = 40;
        let marioLeft = 80;
        let jumpHeight = 0;
        let isJumping = false;
        let obstacleRight = -80;
        let obstacleSpeed = 6;
        let score = 0;
        let gameRunning = true;
        let gravity = 0.8;
        let jumpStrength = 14;

        // Controle de pulo
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isJumping && gameRunning) {
                isJumping = true;
                jumpHeight = jumpStrength;
            }
        });

        // Reiniciar jogo
        restartBtn.addEventListener('click', () => {
            resetGame();
        });

        function resetGame() {
            marioBottom = 40;
            marioLeft = 80;
            obstacleRight = -80;
            obstacleSpeed = 6;
            score = 0;
            gameRunning = true;
            isJumping = false;
            scoreEl.textContent = `Pontos: ${score}`;
            gameOverText.classList.add('hidden');
            restartBtn.classList.add('hidden');
            mario.style.bottom = marioBottom + 'px';
            obstacle.style.right = obstacleRight + 'px';
            gameLoop();
        }

        // Verificar colisão
        function checkCollision() {
            const marioRect = mario.getBoundingClientRect();
            const obstacleRect = obstacle.getBoundingClientRect();

            return !(
                marioRect.top > obstacleRect.bottom ||
                marioRect.bottom < obstacleRect.top ||
                marioRect.left > obstacleRect.right ||
                marioRect.right < obstacleRect.left
            );
        }

        // Loop principal do jogo
        function gameLoop() {
            if (!gameRunning) return;

            // Movimento do obstáculo
            obstacleRight += obstacleSpeed;
            if (obstacleRight > 800) {
                obstacleRight = -80;
                score++;
                scoreEl.textContent = `Pontos: ${score}`;
                // Aumenta velocidade gradualmente
                if (obstacleSpeed < 12) obstacleSpeed += 0.3;
            }
            obstacle.style.right = obstacleRight + 'px';

            // Lógica de pulo com física correta
            if (isJumping) {
                marioBottom += jumpHeight;
                jumpHeight -= gravity;

                // Limite do pulo e retorno ao chão
                if (marioBottom <= 40) {
                    marioBottom = 40;
                    isJumping = false;
                    jumpHeight = 0;
                }

                mario.style.bottom = marioBottom + 'px';
            }

            // Verificar colisão
            if (checkCollision()) {
                gameRunning = false;
                gameOverText.classList.remove('hidden');
                restartBtn.classList.remove('hidden');
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        // Iniciar jogo
        gameLoop();
    </script>
</body>
</html>
